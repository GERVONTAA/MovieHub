    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            direction: rtl;
        }

        .header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid rgba(255, 107, 107, 0.3);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2c2a4a, #6b2d5c, #c17a8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .search-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 0.7rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .search-bar input {
            background: none;
            border: none;
            color: white;
            padding: 0.5rem;
            width: 300px;
            outline: none;
            font-size: 1rem;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .main-content {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

         .hero {
            text-align: center;
            padding: 4rem 0;
            background: linear-gradient(135deg, #2c2a4a, #6b2d5c, #c17a8b);
            border-radius: 20px;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(123, 0, 127, 0.96);
        }

        .hero h1 {
            color: #1a1a1a;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px #000000, 0 0 10px rgba(149, 0, 255, 0.18);
        }

        .hero p {
            font-size: 1.3rem;
            color: #1a1a1a;
            opacity: 0.9;
        }



        .categories {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(70, 0, 123, 0.901);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .category-btn:hover, .category-btn.active {
            background: (135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
            border-color: transparent;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ff6b6b;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 107, 107, 0.6);
        }

        .movie-poster {
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.1);
        }

        .movie-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .movie-overlay {
            opacity: 1;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            opacity: 0;
            transition: all 0.3s ease;
            color: #8800ff;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .movie-info {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .movie-year {
            color: #4ecdc4;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .stars {
            color: #ffd700;
            font-size: 1.1rem;
        }

        .rating-number {
            background: rgba(255, 107, 107, 0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .movie-overview {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(20, 20, 40, 0.95), rgba(40, 40, 60, 0.95));
            border-radius: 25px;
            max-width: 1000px;
            width: 95%;
            max-height: 95vh;
            overflow-y: auto;
            border: 2px solid rgba(255, 107, 107, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            position: relative;
            height: 400px;
            border-radius: 25px 25px 0 0;
            overflow: hidden;
        }

        .modal-backdrop {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .close-btn:hover {
            background: rgba(255, 107, 107, 0.8);
            transform: scale(1.1);
        }

        .modal-body {
            padding: 2rem;
        }

        .movie-details {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .movie-poster-large {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .movie-meta {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .movie-title-large {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .movie-tagline {
            font-style: italic;
            opacity: 0.8;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .movie-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4ecdc4;
        }

        .movie-overview-full {
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .genres {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .genre-tag {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        .trailer-section {
            margin-top: 2rem;
        }

        .trailer-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ff6b6b;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin-bottom: 1rem;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-trailer {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                text-align: center;
            }

            .search-bar input {
                width: 250px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }

            .movie-details {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .movie-poster-large {
                max-width: 250px;
                margin: 0 auto;
            }

            .modal-content {
                margin: 1rem;
                width: calc(100% - 2rem);
            }

            .video-container {
                height: 250px;
            }
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #ff6b6b;
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .movie-features {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 15px;
    padding: 1.5rem;
    margin-top: 2rem;
}

.movie-features h2 {
    color: #ff6b6b;
    margin-bottom: 1rem;
}

.movie-features ul {
    list-style: none;
    padding: 0;
}

.movie-features li {
    margin-bottom: 0.8rem;
    line-height: 1.5;
}

.player-container {
    margin-top: 20px;
    width: 100%;
    background: #111;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
}

.video-player {
    width: 100%;
    height: 450px;
    border-radius: 12px;
}
.server-btn {
    margin: 5px;
    padding: 10px 15px;
    background: #e50914;
    color: #fff;
    border: none;
    border-radius: 8px;

}
.server-btn:hover {
    background: #b50710;
}
.watch-btn {
    display: inline-flex;
    align-items: center;

    padding: 14px 34px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    border: none;
    border-radius: 40px;
    cursor: pointer;

}

.watch-btn svg {
    width: 20px;

}

.watch-btn:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 18px 40px rgba(193, 122, 139, 0.7);
    filter: brightness(1.1);
}

.watch-btn:active {
    transform: scale(0.97);

.watch-btn:focus {
    outline: none;
}
.watch-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;

    background-color: #ff3b3b; /* أحمر جذاب */
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.watch-btn:hover {
    background-color: #ff1a1a;
    transform: scale(1.05);
}

.watch-btn svg {
    fill: #fff;
}

    </style>
</head>



<body>
    <!-- Movie details section (modal content) -->
    <header class="header">
        <nav class="nav">
            <div class="logo">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="camera" viewBox="0 0 16 16">
                <path d="M6 3a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                <path d="M9 6h.5a2 2 0 0 1 1.983 1.738l3.11-1.382A1 1 0 0 1 16 7.269v7.462a1 1 0 0 1-1.406.913l-3.111-1.382A2 2 0 0 1 9.5 16H2a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm6 8.73V7.27l-3.5 1.555v4.35zM1 8v6a1 1 0 0 0 1 1h7.5a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1"/>
                <path d="M9 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6M7 3a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
              </svg>
              MovieHub
            </div>
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" placeholder="ابحث عن فيلم..." id="searchInput">
                    <span>
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85z"/>
                        <path d="M12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                      </svg>
                    </span>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="hero">
            <h1>اكتشف أفضل الأفلام العالمية</h1>
            <p>شاهد أحدث الأفلام و بجودة عالية</p>
        </section>

        <div class="categories">
            <button class="category-btn active" data-category="">الكل</button>
            <button class="category-btn" data-category="28">أكشن</button>
            <button class="category-btn" data-category="35">كوميديا</button>
            <button class="category-btn" data-category="18">دراما</button>
            <button class="category-btn" data-category="27">رعب</button>
            <button class="category-btn" data-category="878">خيال علمي</button>
            <button class="category-btn" data-category="16">رسوم متحركة</button>
            <button class="category-btn" data-category="10749">رومانسي</button>
            <button class="category-btn" data-category="53">إثارة</button>
            <button class="category-btn" data-category="99">وثائقي</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>جاري تحميل الأفلام...</p>
        </div>

        <div id="moviesGrid" class="movies-grid">
            <!-- الأفلام ستظهر هنا -->
        </div>
    </main>

    <!-- Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <img id="modalBackdrop" class="modal-backdrop" src="" alt="">
                <div class="modal-overlay"></div>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- تفاصيل الفيلم ستظهر هنا -->
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP_BASE_URL = 'https://image.tmdb.org/t/p/w1280';

        let currentPage = 1;
        let currentCategory = '';
        let currentSearchQuery = '';
        let isLoading = false;

        const moviesGrid = document.getElementById('moviesGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const modal = document.getElementById('movieModal');
        const modalBody = document.getElementById('modalBody');
        const modalBackdrop = document.getElementById('modalBackdrop');
        const closeModal = document.getElementById('closeModal');
        const loading = document.getElementById('loading');

        document.addEventListener('DOMContentLoaded', () => {
            loadMovies();
            setupEventListeners();
        });

        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(handleSearch, 300));

            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    currentPage = 1;
                    currentSearchQuery = '';
                    searchInput.value = '';
                    loadMovies();
                });
            });

            closeModal.addEventListener('click', () => { modal.style.display = 'none'; });
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000) {
                    if (!isLoading) { currentPage++; loadMovies(true); }
                }
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        function handleSearch(e) {
            currentSearchQuery = e.target.value.trim();
            currentPage = 1;
            if (currentSearchQuery) { currentCategory = ''; categoryBtns.forEach(btn => btn.classList.remove('active')); }
            loadMovies();
        }

        async function loadMovies(append=false) {
            if (isLoading) return;
            isLoading = true;
            loading.style.display = 'block';

            try {
                let url;
                if (currentSearchQuery) {
                    url = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(currentSearchQuery)}&page=${currentPage}&language=ar`;
                } else if (currentCategory) {
                    url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=${currentCategory}&page=${currentPage}&language=ar&sort_by=popularity.desc`;
                } else {
                    url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&page=${currentPage}&language=ar`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (!append) moviesGrid.innerHTML = '';

                if (data.results && data.results.length > 0) {
                    data.results.forEach(movie => { createMovieCard(movie); });
                } else if (!append) {
                    moviesGrid.innerHTML = '<div class="error-message">لم يتم العثور على أفلام</div>';
                }
            } catch (error) {
                console.error('Error loading movies:', error);
                if (!append) moviesGrid.innerHTML = '<div class="error-message">حدث خطأ في تحميل الأفلام</div>';
            }

            isLoading = false;
            loading.style.display = 'none';
        }

        function createMovieCard(movie) {
            const movieCard = document.createElement('div');
            movieCard.className = 'movie-card fade-in';
            movieCard.onclick = () => openMovieModal(movie.id);

            const rating = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
            const stars = generateStars(movie.vote_average);
            const releaseYear = movie.release_date ? new Date(movie.release_date).getFullYear() : 'غير محدد';
            const poster = movie.poster_path ? `${IMAGE_BASE_URL}${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';

            movieCard.innerHTML = `
                <div class="movie-poster">
                    <img src="${poster}" alt="${movie.title}" loading="lazy">
                    <div class="movie-overlay"></div>
                    <div class="play-overlay">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-play-fill" viewBox="0 0 16 16">
                            <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>
                        </svg>
                    </div>
                </div>
                <div class="movie-info">
                    <h3 class="movie-title">${movie.title || movie.original_title}</h3>
                    <div class="movie-year">${releaseYear}</div>
                    <div class="movie-rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-number">${rating}</span>
                    </div>
                    <p class="movie-overview">${movie.overview || 'لا يوجد وصف متاح'}</p>
                </div>
            `;
            moviesGrid.appendChild(movieCard);
        }

        function generateStars(rating) {
            const starCount = Math.round(rating / 2);
            return '⭐'.repeat(Math.min(starCount, 5));
        }

        async function openMovieModal(movieId) {
            try {
                loading.style.display = 'block';
                const movieResponse = await fetch(`${BASE_URL}/movie/${movieId}?api_key=${API_KEY}&language=ar`);
                const movie = await movieResponse.json();

                const videosResponse = await fetch(`${BASE_URL}/movie/${movieId}/videos?api_key=${API_KEY}`);
                const videos = await videosResponse.json();

                const creditsResponse = await fetch(`${BASE_URL}/movie/${movieId}/credits?api_key=${API_KEY}`);
                const credits = await creditsResponse.json();

                loading.style.display = 'none';
                displayMovieModal(movie, videos.results, credits);
                modal.style.display = 'block';
            } catch (error) {
                console.error('Error loading movie details:', error);
                loading.style.display = 'none';
            }
        }

        function displayMovieModal(movie, videos, credits) {
            const backdropUrl = movie.backdrop_path ? `${BACKDROP_BASE_URL}${movie.backdrop_path}` : `${IMAGE_BASE_URL}${movie.poster_path}`;
            modalBackdrop.src = backdropUrl;

            const rating = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
            const stars = generateStars(movie.vote_average);
            const releaseYear = movie.release_date ? new Date(movie.release_date).getFullYear() : 'غير محدد';
            const runtime = movie.runtime ? `${movie.runtime} دقيقة` : 'غير محدد';
            const budget = movie.budget ? `$${(movie.budget/1000000).toFixed(1)}M` : 'غير محدد';
            const revenue = movie.revenue ? `$${(movie.revenue/1000000).toFixed(1)}M` : 'غير محدد';

            const mainCast = credits.cast ? credits.cast.slice(0,5).map(a => a.name).join(', ') : 'غير متوفر';
            const director = credits.crew ? credits.crew.find(p => p.job==='Director')?.name || 'غير متوفر' : 'غير متوفر';
            const trailer = videos.find(v=>v.type==='Trailer' && v.site==='YouTube') || videos.find(v=>v.site==='YouTube');

            modalBody.innerHTML = `
                <div class="movie-details">
                    <img src="${movie.poster_path ? IMAGE_BASE_URL+movie.poster_path : 'https://via.placeholder.com/500x750?text=No+Image'}" class="movie-poster-large">
                    <div class="movie-meta">
                        <h1 class="movie-title-large">${movie.title || movie.original_title}</h1>
                        ${movie.tagline ? `<p class="movie-tagline">"${movie.tagline}"</p>` : ''}
                        <div class="movie-stats">
                            <div class="stat"><span class="stat-label">التقييم</span><span class="stat-value">${stars} ${rating}/10</span></div>
                            <div class="stat"><span class="stat-label">سنة الإنتاج</span><span class="stat-value">${releaseYear}</span></div>
                            <div class="stat"><span class="stat-label">المدة</span><span class="stat-value">${runtime}</span></div>
                            <div class="stat"><span class="stat-label">ميزانية</span><span class="stat-value">${budget}</span></div>
                            <div class="stat"><span class="stat-label">الإيرادات</span><span class="stat-value">${revenue}</span></div>
                            <div class="stat"><span class="stat-label">المخرج</span><span class="stat-value">${director}</span></div>
                            <div class="stat"><span class="stat-label">الممثلون الرئيسيون</span><span class="stat-value">${mainCast}</span></div>
                        </div>
                    </div>
                    <p class="movie-overview-full">${movie.overview || 'لا يوجد وصف متاح'}</p>
                    <div class="genres">${movie.genres ? movie.genres.map(g=>`<span class="genre-tag">${g.name}</span>`).join('') : ''}</div>
                    <div class="trailer-section">
                        <h2 class="trailer-title">تريلر الفيلم</h2>
                        ${trailer ? `<iframe class="video-iframe" src="https://www.youtube.com/embed/${trailer.key}" allowfullscreen></iframe>` : `<div class="no-trailer">لا يوجد تريلر متاح</div>`}
                    </div>
                    <div class="watch-section">
                        <button class="watch-btn" onclick="watchMovie('${movie.id}', '${movie.title}')">▶ مشاهدة الفيلم</button>
                    </div>
                </div>
            `;
        }

        function watchMovie(movieId, title) {
            const watchUrl = `https://vidsrc.xyz/embed/movie/${movieId}`;
            window.open(watchUrl, '_blank');
            console.log(`جاري فتح الفيلم: ${title}`);
        }
    </script>
</body>


</html>
