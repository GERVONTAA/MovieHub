    <style>
      /* ===== Reset & Base Styles ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    color: white;
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
}

/* ===== Scrollbar Styling ===== */
::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-track {
    background: #1a1a2e;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, #8b3d7c, #d18a9b);
}

/* ===== Selection Styling ===== */
::selection {
    background: #6b2d5c;
    color: white;
}

/* ===== Header & Navigation ===== */
.header {
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 1rem 2rem;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid rgba(107, 45, 92, 0.5);
    box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 1rem;
}

.logo {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c17a8b, #6b2d5c, #2c2a4a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.logo:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.logo svg {
    width: 32px;
    height: 32px;
    fill: #c17a8b;
}

/* ===== Search Container ===== */
.search-container {
    display: flex;
    gap: 1rem;
    align-items: center;
}

.search-bar {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 50px;
    padding: 0.7rem 1.5rem;
    border: 2px solid rgba(255, 255, 255, 0.15);
    transition: all 0.3s ease;
}

.search-bar:focus-within {
    border-color: #c17a8b;
    box-shadow: 0 0 25px rgba(193, 122, 139, 0.4);
    background: rgba(255, 255, 255, 0.12);
}

.search-bar input {
    background: none;
    border: none;
    color: white;
    padding: 0.5rem;
    width: 300px;
    outline: none;
    font-size: 1rem;
    font-family: 'Cairo', sans-serif;
}

.search-bar input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.search-bar span {
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: all 0.3s ease;
}

.search-bar span:hover {
    color: #c17a8b;
    transform: scale(1.1);
}

.search-bar svg {
    width: 20px;
    height: 20px;
}

/* ===== Main Content ===== */
.main-content {
    margin-top: 100px;
    padding: 2rem;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
}

/* ===== Hero Section ===== */
.hero {
    text-align: center;
    padding: 4rem 2rem;
    background: linear-gradient(135deg, #2c2a4a 0%, #6b2d5c 50%, #c17a8b 100%);
    border-radius: 25px;
    margin-bottom: 3rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 50px rgba(107, 45, 92, 0.5);
}

.hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
}

.hero h1 {
    color: #ffffff;
    font-size: 3.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    position: relative;
    z-index: 1;
}

.hero p {
    font-size: 1.3rem;
    color: #ffffff;
    opacity: 0.9;
    position: relative;
    z-index: 1;
}

/* ===== Categories ===== */
.categories {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 1rem 0;
}

.category-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(107, 45, 92, 0.5);
    color: white;
    padding: 0.8rem 1.8rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(10px);
    font-size: 1rem;
    font-weight: 600;
    white-space: nowrap;
    font-family: 'Cairo', sans-serif;
}

.category-btn:hover {
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(107, 45, 92, 0.5);
    border-color: transparent;
}

.category-btn.active {
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    border-color: transparent;
    box-shadow: 0 10px 30px rgba(107, 45, 92, 0.5);
    transform: scale(1.05);
}

/* ===== Loading Spinner ===== */
.loading {
    text-align: center;
    padding: 3rem;
    font-size: 1.2rem;
}

.spinner {
    display: inline-block;
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    border-top-color: #c17a8b;
    border-right-color: #6b2d5c;
    animation: spin 1s ease-in-out infinite;
    margin-bottom: 1rem;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ===== Movies Grid ===== */
.movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2.5rem;
    margin-top: 2rem;
}

/* ===== Movie Card ===== */
.movie-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border: 2px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    position: relative;
}

.movie-card:hover {
    transform: translateY(-15px) scale(1.02);
    box-shadow: 0 25px 60px rgba(107, 45, 92, 0.4);
    border-color: rgba(193, 122, 139, 0.6);
}

.movie-poster {
    height: 400px;
    position: relative;
    overflow: hidden;
}

.movie-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.movie-card:hover .movie-poster img {
    transform: scale(1.15);
}

.movie-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
}

.movie-card:hover .movie-overlay {
    opacity: 1;
}

.play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 80px;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    color: #c17a8b;
    text-shadow: 0 0 30px rgba(193, 122, 139, 0.8);
    filter: drop-shadow(0 0 20px rgba(193, 122, 139, 0.6));
}

.movie-card:hover .play-overlay {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.play-overlay svg {
    width: 80px;
    height: 80px;
    fill: #c17a8b;
}

/* ===== Movie Info ===== */
.movie-info {
    padding: 1.5rem;
}

.movie-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.movie-year {
    color: #c17a8b;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    font-weight: 600;
}

.movie-rating {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
}

.stars {
    color: #ffd700;
    font-size: 1.1rem;
    letter-spacing: 2px;
}

.rating-number {
    background: linear-gradient(135deg, rgba(107, 45, 92, 0.3), rgba(193, 122, 139, 0.3));
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 700;
    border: 1px solid rgba(193, 122, 139, 0.3);
}

.movie-overview {
    font-size: 0.95rem;
    line-height: 1.6;
    opacity: 0.75;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* ===== Modal Styles ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 2000;
    backdrop-filter: blur(15px);
    overflow-y: auto;
}

.modal-content {
    position: relative;
    margin: 2rem auto;
    background: linear-gradient(145deg, rgba(20, 20, 40, 0.98), rgba(40, 40, 60, 0.98));
    border-radius: 25px;
    max-width: 1000px;
    width: 95%;
    border: 2px solid rgba(107, 45, 92, 0.4);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
    overflow: hidden;
}

.modal-header {
    position: relative;
    height: 450px;
    overflow: hidden;
}

.modal-backdrop {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
}

.modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to top, rgba(20, 20, 40, 1) 0%, rgba(20, 20, 40, 0.8) 30%, transparent 100%);
}

.close-btn {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    z-index: 10;
}

.close-btn:hover {
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    border-color: transparent;
    transform: scale(1.1) rotate(90deg);
}

.modal-body {
    padding: 2.5rem;
}

/* ===== Movie Details in Modal ===== */
.movie-details {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 2.5rem;
    margin-bottom: 2rem;
}

.movie-poster-large {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
    border: 3px solid rgba(107, 45, 92, 0.3);
}

.movie-meta {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.movie-title-large {
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #c17a8b, #6b2d5c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
}

.movie-tagline {
    font-style: italic;
    opacity: 0.7;
    font-size: 1.15rem;
    margin-bottom: 1rem;
    color: #c17a8b;
}

.movie-stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
}

.stat {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.stat-label {
    font-size: 0.85rem;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.stat-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: #c17a8b;
}

.movie-overview-full {
    line-height: 1.8;
    font-size: 1.05rem;
    margin: 2rem 0;
    padding: 1.5rem;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 15px;
    border-right: 4px solid #6b2d5c;
}

/* ===== Genres ===== */
.genres {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin: 1.5rem 0;
}

.genre-tag {
    background: linear-gradient(135deg, rgba(107, 45, 92, 0.3), rgba(193, 122, 139, 0.3));
    border: 1px solid rgba(193, 122, 139, 0.4);
    padding: 0.4rem 1rem;
    border-radius: 25px;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s ease;
}

.genre-tag:hover {
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    transform: scale(1.05);
}

/* ===== Movie Features ===== */
.movie-features {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(107, 45, 92, 0.3);
    border-radius: 20px;
    padding: 2rem;
    margin: 2rem 0;
}

.movie-features h2 {
    color: #c17a8b;
    margin-bottom: 1.5rem;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.movie-features ul {
    list-style: none;
    padding: 0;
}

.movie-features li {
    margin-bottom: 1rem;
    line-height: 1.6;
    padding: 0.8rem 1rem;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 10px;
    transition: all 0.3s ease;
}

.movie-features li:hover {
    background: rgba(107, 45, 92, 0.2);
    transform: translateX(-5px);
}

.movie-features li strong {
    color: #c17a8b;
    margin-left: 0.5rem;
}

/* ===== Trailer Section ===== */
.trailer-section {
    margin-top: 2.5rem;
}

.trailer-title {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #c17a8b;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.video-container {
    position: relative;
    width: 100%;
    height: 450px;
    border-radius: 20px;
    overflow: hidden;
    background: #000;
    margin-bottom: 1rem;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(107, 45, 92, 0.3);
}

.video-iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.no-trailer {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 20px;
    font-size: 1.2rem;
    opacity: 0.6;
    border: 2px dashed rgba(107, 45, 92, 0.3);
}

/* ===== Watch Button ===== */
.watch-section {
    margin-top: 2rem;
    text-align: center;
}

.watch-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 50px;
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    box-shadow: 0 15px 40px rgba(229, 9, 20, 0.5);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    font-family: 'Cairo', sans-serif;
    text-decoration: none;
    position: relative;
    overflow: hidden;
}

.watch-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
}

.watch-btn:hover::before {
    left: 100%;
}

.watch-btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 20px 50px rgba(229, 9, 20, 0.7);
    background: linear-gradient(135deg, #ff1a1a 0%, #e50914 100%);
}

.watch-btn:active {
    transform: translateY(-2px) scale(1.02);
}

.watch-btn svg {
    width: 26px;
    height: 26px;
    fill: currentColor;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
}

/* ===== Server Buttons ===== */
.server-buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.5rem;
}

.server-btn {
    padding: 12px 25px;
    background: linear-gradient(135deg, #6b2d5c, #c17a8b);
    color: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Cairo', sans-serif;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(107, 45, 92, 0.4);
}

.server-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 35px rgba(107, 45, 92, 0.6);
    background: linear-gradient(135deg, #8b3d7c, #d18a9b);
}

/* ===== Player Container ===== */
.player-container {
    margin-top: 2rem;
    width: 100%;
    background: #000;
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    border: 2px solid rgba(107, 45, 92, 0.3);
}

.video-player {
    width: 100%;
    height: 500px;
    border-radius: 15px;
    border: none;
}

/* ===== Error Message ===== */
.error-message {
    text-align: center;
    padding: 4rem 2rem;
    font-size: 1.3rem;
    color: #c17a8b;
    background: rgba(107, 45, 92, 0.1);
    border-radius: 20px;
    border: 2px dashed rgba(107, 45, 92, 0.3);
}

.error-message small {
    display: block;
    margin-top: 1rem;
    opacity: 0.7;
    font-size: 1rem;
}

/* ===== Animations ===== */
.fade-in {
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.05);
    }
}

@keyframes shimmer {
    0% {
        background-position: -200% 0;
    }
    100% {
        background-position: 200% 0;
    }
}

/* ===== Skeleton Loading ===== */
.skeleton {
    background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 10px;
}

/* ===== Tooltip ===== */
.tooltip {
    position: relative;
}

.tooltip::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.tooltip:hover::after {
    opacity: 1;
    visibility: visible;
    bottom: calc(100% + 10px);
}

// ===== Utility Functions =====
function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

function formatNumber(num) {
    if (num >= 1000000000) {
        return (num / 1000000000).toFixed(1) + 'B';
    }
    if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
    }
    if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
    }
    return num.toString();
}

function formatDate(dateString) {
    if (!dateString) return 'غير محدد';
    const date = new Date(dateString);
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    return date.toLocaleDateString('ar-EG', options);
}

function formatRuntime(minutes) {
    if (!minutes) return 'غير محدد';
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    if (hours > 0) {
        return `${hours} ساعة ${mins > 0 ? `و ${mins} دقيقة` : ''}`;
    }
    return `${mins} دقيقة`;
}

function generateStars(rating) {
    if (!rating) return '☆☆☆☆☆';
    const starCount = Math.round(rating / 2);
    const fullStars = '★'.repeat(Math.min(starCount, 5));
    const emptyStars = '☆'.repeat(5 - Math.min(starCount, 5));
    return fullStars + emptyStars;
}

function getImageUrl(path, size = 'w500') {
    if (!path) return 'https://via.placeholder.com/500x750/1a1a2e/ffffff?text=لا+توجد+صورة';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

    elements.loading.style.display = 'none';
}

// ===== Search Handler =====
function handleSearch(e) {
    const query = e.target ? e.target.value.trim() : elements.searchInput.value.trim();
    
    if (query === state.currentSearchQuery) return;
    
    state.currentSearchQuery = query;
    state.currentPage = 1;
    state.hasMorePages = true;
    
    if (query) {
        state.currentCategory = '';
        elements.categoryBtns.forEach(btn => btn.classList.remove('active'));
    }
    
    loadMovies();
}

// ===== Category Handler =====
function handleCategoryClick(btn) {
    elements.categoryBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    state.currentCategory = btn.dataset.category;
    state.currentPage = 1;
    state.currentSearchQuery = '';
    state.hasMorePages = true;
    elements.searchInput.value = '';
    
    loadMovies();
}

// ===== Reset to Home =====
function resetToHome() {
    state.currentPage = 1;
    state.currentCategory = '';
    state.currentSearchQuery = '';
    state.hasMorePages = true;
    
    elements.searchInput.value = '';
    elements.categoryBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.category === '') {
            btn.classList.add('active');
        }
    });
    
    loadMovies();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== API Fetch Function =====
async function fetchFromAPI(endpoint, params = {}) {
    const url = new URL(`${CONFIG.BASE_URL}${endpoint}`);
    url.searchParams.append('api_key', CONFIG.API_KEY);
    url.searchParams.append('language', CONFIG.LANGUAGE);
    
    Object.entries(params).forEach(([key, value]) => {
        url.searchParams.append(key, value);
    });
    
    try {
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        return await response.json();
    } catch (error) {
        console.error('API Fetch Error:', error);
        throw error;
    }
}

// ===== Load Movies =====
async function loadMovies(append = false) {
    if (state.isLoading) return;
    
    showLoading();
    
    if (!append) {
        elements.moviesGrid.innerHTML = showSkeletonLoading(8);
    }
    
    try {
        let data;
        
        if (state.currentSearchQuery) {
            data = await fetchFromAPI('/search/movie', {
                query: state.currentSearchQuery,
                page: state.currentPage
            });
        } else if (state.currentCategory) {
            data = await fetchFromAPI('/discover/movie', {
                with_genres: state.currentCategory,
                page: state.currentPage,
                sort_by: 'popularity.desc'
            });
        } else {
            data = await fetchFromAPI('/movie/popular', {
                page: state.currentPage
            });
        }
        
        state.totalPages = data.total_pages;
        state.hasMorePages = state.currentPage < data.total_pages;
        
        if (!append) {
            elements.moviesGrid.innerHTML = '';
        }
        
        if (data.results && data.results.length > 0) {
            data.results.forEach((movie, index) => {
                createMovieCard(movie, index);
            });
        } else if (!append) {
            showNoResults();
        }
        
    } catch (error) {
        console.error('Error loading movies:', error);
        if (!append) {
            showError();
        }
    } finally {
        hideLoading();
    }
}

// ===== Show Error =====
function showError() {
    elements.moviesGrid.innerHTML = `

// ===== Check if New Release =====
function isNewRelease(dateString) {
    if (!dateString) return false;
    const releaseDate = new Date(dateString);
    const now = new Date();
    const diffTime = Math.abs(now - releaseDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    return diffDays <= 90; // Released within last 90 days
}

// ===== Toggle Favorite =====
function toggleFavorite(movieId) {
    const index = state.favorites.indexOf(movieId);
    
    if (index > -1) {
        state.favorites.splice(index, 1);
        showNotification('تم إزالة الفيلم من المفضلة', 'info');
    } else {
        state.favorites.push(movieId);
        showNotification('تم إضافة الفيلم إلى المفضلة', 'success');
    }
    
    localStorage.setItem('favorites', JSON.stringify(state.favorites));
    
    // Update button state
    const btn = document.querySelector(`.favorite-btn[onclick*="${movieId}"]`);
    if (btn) {
        btn.classList.toggle('active');
        btn.innerHTML = state.favorites.includes(movieId) ? '❤️' : '🤍';
    }
}

// ===== Open Movie Modal =====
async function openMovieModal(movieId) {
    state.currentMovieId = movieId;
    showLoading();
    
    try {
        // Fetch all movie data in parallel
        const [movie, videos, credits, similar, reviews] = await Promise.all([
            fetchFromAPI(`/movie/${movieId}`),
            fetchFromAPI(`/movie/${movieId}/videos`),
            fetchFromAPI(`/movie/${movieId}/credits`),
            fetchFromAPI(`/movie/${movieId}/similar`),
            fetchFromAPI(`/movie/${movieId}/reviews`)
        ]);
        
        displayMovieModal(movie, videos.results, credits, similar.results, reviews.results);
        elements.modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        // Add to watch history
        addToWatchHistory(movieId);
        
    } catch (error) {
        console.error('Error loading movie details:', error);
        showNotification('حدث خطأ في تحميل تفاصيل الفيلم', 'error');
    } finally {
        hideLoading();
    }
}

// ===== Close Movie Modal =====
function closeMovieModal() {
    elements.modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    state.currentMovieId = null;
    state.currentServer = 0;
    
    // Stop any playing videos
    const iframes = elements.modalBody.querySelectorAll('iframe');
    iframes.forEach(iframe => {
        iframe.src = '';
    });
}

// ===== Add to Watch History =====
function addToWatchHistory(movieId) {
    if (!state.watchHistory.includes(movieId)) {
        state.watchHistory.unshift(movieId);
        if (state.watchHistory.length > 50) {
            state.watchHistory.pop();
        }
        localStorage.setItem('watchHistory', JSON.stringify(state.watchHistory));
    }
}

        'hi': 'الهندية',
        'ru': 'الروسية',
        'pt': 'البرتغالية',
        'tr': 'التركية'

    return languages[code] || code?.toUpperCase() || 'غير محدد';

}

// ===== Show Watch Options =====
function showWatchOptions(movieId, movieTitle) {
    const playerSection = document.getElementById('playerSection');
    const serverButtons = document.getElementById('serverButtons');
    const playerContainer = document.getElementById('playerContainer');
    
    playerSection.style.display = 'block';
    
    // Create server buttons
    serverButtons.innerHTML = VIDEO_SERVERS.map((server, index) => `
        <button class="server-btn ${index === 0 ? 'active' : ''}" 
                onclick="changeServer(${index}, ${movieId})">
            ${server.name}
        </button>
    `).join('');
    
    // Load first server
    changeServer(0, movieId);
    
    // Scroll to player
    playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== Change Server =====
function changeServer(serverIndex, movieId) {
    state.currentServer = serverIndex;
    const server = VIDEO_SERVERS[serverIndex];
    const playerContainer = document.getElementById('playerContainer');
    
    // Update button states
    document.querySelectorAll('.server-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', idx === serverIndex);
    });
    
    // Load video
    playerContainer.innerHTML = `
        <iframe 
            class="video-player" 
            src="${server.url(movieId)}" 
            frameborder="0" 
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        ></iframe>
    `;
}

// ===== Play Trailer =====
function playTrailer(videoKey) {
    if (!videoKey) {
        showNotification('لا يوجد تريلر متاح لهذا الفيلم', 'info');
        return;
    }
    
    const trailerModal = document.createElement('div');
    trailerModal.className = 'trailer-modal';
    trailerModal.innerHTML = `
        <div class="trailer-modal-content">
            <button class="trailer-close-btn" onclick="this.parentElement.parentElement.remove()">×</button>
            <iframe 
                src="https://www.youtube.com/embed/${videoKey}?autoplay=1" 
                frameborder="0" 
                allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            ></iframe>
        </div>
    `;
    
    // Add trailer modal styles
    if (!document.getElementById('trailer-modal-styles')) {
        const styles = document.createElement('style');
        styles.id = 'trailer-modal-styles';
        styles.textContent = `
            .trailer-modal {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.95);
                z-index: 3000;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: fadeIn 0.3s ease;
            }
            .trailer-modal-content {
                position: relative;
                width: 90%;
                max-width: 1000px;
                aspect-ratio: 16/9;
            }
            .trailer-modal-content iframe {
                width: 100%;
                height: 100%;
                border-radius: 15px;
            }
            .trailer-close-btn {
                position: absolute;
                top: -50px;
                right: 0;
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                font-size: 2rem;
                width: 45px;
                height: 45px;
                border-radius: 50%;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            .trailer-close-btn:hover {
                background: #e74c3c;
                transform: rotate(90deg);
            }
        `;
        document.head.appendChild(styles);
    }
    
    document.body.appendChild(trailerModal);
    
    // Close on backdrop click
    trailerModal.addEventListener('click', (e) => {
        if (e.target === trailerModal) {
            trailerModal.remove();
        }
    });
    
    // Close on Escape
    const escHandler = (e) => {
        if (e.key === 'Escape') {
            trailerModal.remove();
            document.removeEventListener('keydown', escHandler);
        }
    };
    document.addEventListener('keydown', escHandler);
}

// ===== Watch Movie (Direct) =====
function watchMovie(movieId, title) {
    const watchUrl = VIDEO_SERVERS[0].url(movieId);
    window.open(watchUrl, '_blank');
    console.log(`🎬 Opening movie: ${title}`);
    showNotification(`جاري فتح ${title}`, 'success');
}
