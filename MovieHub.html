        .footer a:hover {
            text-decoration: underline;
        }

        /* ===== Animations ===== */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        /* ===== Responsive Design ===== */
        @media (max-width: 1200px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 2rem;
            }
        }

        @media (max-width: 992px) {
            .hero h1 {
                font-size: 2.8rem;
            }

            .movie-details {
                grid-template-columns: 180px 1fr;
                gap: 2rem;
            }

            .movie-title-large {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .nav {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }

            .search-bar {
                width: 100%;
            }

            .search-bar input {
                width: 100%;
            }

            .main-content {
                padding: 1rem;
                margin-top: 180px;
            }

            .hero {
                padding: 3rem 1.5rem;
                border-radius: var(--border-radius);
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .categories {
                gap: 0.8rem;
            }

            .category-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .movie-poster {
                height: 250px;
            }

            .movie-info {
                padding: 1rem;
            }

            .movie-title {
                font-size: 1rem;
            }

            .movie-overview {
                display: none;
            }

            .modal-content {
                margin: 0;
                width: 100%;
                border-radius: 0;
                min-height: 100vh;
            }

            .modal-header {
                height: 280px;
            }

            .movie-details {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .movie-poster-large {
                max-width: 180px;
                margin: 0 auto;
            }

            .movie-title-large {
                font-size: 1.6rem;
            }

            .movie-stats {
                justify-content: center;
                gap: 1.5rem;
            }

            .genres {
                justify-content: center;
            }

            .action-buttons {
                flex-direction: column;
            }

            .watch-btn,
            .trailer-btn {
                width: 100%;
                justify-content: center;
            }

            .video-container,
            .player-container {
                height: auto;
            }

            .video-player {
                height: 280px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .comments-section {
                padding: 1.5rem;
            }

            .comment-header {
                flex-direction: column;
            }

            .comment-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .comment-replies {
                padding-right: 1rem;
            }

            .cast-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }

            .cast-card img {
                height: 120px;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .hero p {
                font-size: 0.95rem;
            }

            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }

            .movie-poster {
                height: 180px;
            }

            .movie-info {
                padding: 0.8rem;
            }

            .movie-title {
                font-size: 0.85rem;
                -webkit-line-clamp: 1;
            }

            .movie-year,
            .movie-rating {
                font-size: 0.75rem;
            }

            .close-btn {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
                top: 1rem;
                right: 1rem;
            }

            .modal-body {
                padding: 1.5rem;
            }

            .movie-features {
                padding: 1.5rem;
            }

            .watch-btn {
                padding: 14px 20px;
                font-size: 1rem;
            }
        }

        /* ===== Print Styles ===== */
        @media print {
            .header,
            .categories,
            .watch-btn,
            .trailer-section,
            .close-btn,
            .comments-section,
            .player-section {
                display: none !important;
            }

            body {
                background: white;
                color: black;
            }

            .movie-card {
                break-inside: avoid;
            }
        }

        /* ===== Accessibility ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ===== Focus States ===== */
        .category-btn:focus,
        .watch-btn:focus,
        .server-btn:focus,
        .close-btn:focus,
        .search-bar input:focus,
        .submit-comment-btn:focus {
            outline: 3px solid var(--secondary-color);
            outline-offset: 3px;
        }

        /* ===== High Contrast Mode ===== */
        @media (prefers-contrast: high) {
            .movie-card {
                border: 3px solid white;
            }

            .category-btn {
                border: 2px solid white;
            }
        }

        /* ===== No Script Warning ===== */
        noscript {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--error-color);
            color: white;
            text-align: center;
            padding: 20px;
            z-index: 9999;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <!-- No JavaScript Warning -->
    <noscript>
        <div>⚠️ يجب تفعيل JavaScript لاستخدام هذا الموقع</div>
    </noscript>

    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <a class="logo" href="#" onclick="resetToHome(); return false;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c17a8b"/>
                            <stop offset="100%" style="stop-color:#6b2d5c"/>
                        </linearGradient>
                    </defs>
                    <path fill="url(#logoGradient)" d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
                </svg>
                MovieHub
            </a>
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" placeholder="ابحث عن فيلم..." id="searchInput" autocomplete="off" />
                    <span class="search-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <h1>🎬 اكتشف أفضل الأفلام العالمية</h1>
            <p>شاهد أحدث الأفلام بجودة عالية ومترجمة</p>
        </section>

        <!-- Categories -->
        <div class="categories">
            <button class="category-btn active" data-category="">الكل</button>
            <button class="category-btn" data-category="28">أكشن</button>
            <button class="category-btn" data-category="35">كوميديا</button>
            <button class="category-btn" data-category="18">دراما</button>
            <button class="category-btn" data-category="27">رعب</button>
            <button class="category-btn" data-category="878">خيال علمي</button>
            <button class="category-btn" data-category="16">رسوم متحركة</button>
            <button class="category-btn" data-category="10749">رومانسي</button>
            <button class="category-btn" data-category="53">إثارة</button>
            <button class="category-btn" data-category="99">وثائقي</button>
            <button class="category-btn" data-category="14">فانتازيا</button>
            <button class="category-btn" data-category="80">جريمة</button>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>جاري تحميل الأفلام...</p>
        </div>

        <!-- Movies Grid -->
        <div id="moviesGrid" class="movies-grid"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 MovieHub - جميع الحقوق محفوظة | صُنع بـ ❤️</p>
    </footer>

    <!-- Movie Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <img id="modalBackdrop" class="modal-backdrop" src="" alt="" />
                <div class="modal-overlay"></div>
                <button class="close-btn" id="closeModal" aria-label="إغلاق">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // ===== Configuration =====
        const CONFIG = {
            API_KEY: '8265bd1679663a7ea12ac168da84d2e8',
            BASE_URL: 'https://api.themoviedb.org/3',
            IMAGE_BASE_URL: 'https://image.tmdb.org/t/p',
            LANGUAGE: 'ar'
        };

        // ===== Video Servers =====
        const VIDEO_SERVERS = [
            { id: 'vidsrc', name: 'سيرفر 1', url: (id) => `https://vidsrc.xyz/embed/movie/${id}` },
            { id: 'vidsrc2', name: 'سيرفر 2', url: (id) => `https://vidsrc.me/embed/movie?tmdb=${id}` },
            { id: '2embed', name: 'سيرفر 3', url: (id) => `https://www.2embed.cc/embed/${id}` },
            { id: 'autoembed', name: 'سيرفر 4', url: (id) => `https://autoembed.co/movie/tmdb/${id}` },
            { id: 'multiembed', name: 'سيرفر 5', url: (id) => `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` }
        ];

        // ===== State =====
        let state = {
            currentPage: 1,
            currentCategory: '',
            currentSearchQuery: '',
            isLoading: false,
            hasMorePages: true,
            currentMovieId: null,
            favorites: JSON.parse(localStorage.getItem('favorites')) || [],
            currentServer: 0
        };

        // ===== Comments State =====
        let commentsState = {
            comments: JSON.parse(localStorage.getItem('movieComments')) || {},
            sortBy: 'newest',
            currentPage: 1,
            commentsPerPage: 5
        };

        // ===== DOM Elements =====
        const elements = {
            moviesGrid: document.getElementById('moviesGrid'),
            searchInput: document.getElementById('searchInput'),
            categoryBtns: document.querySelectorAll('.category-btn'),
            modal: document.getElementById('movieModal'),
            modalBody: document.getElementById('modalBody'),
            modalBackdrop: document.getElementById('modalBackdrop'),
            closeModal: document.getElementById('closeModal'),
            loading: document.getElementById('loading')
        };

        // ===== Security System =====
        const security = {
            rateLimits: new Map(),
            
            checkRateLimit(action, limit = 30, windowMs = 60000) {
                const now = Date.now();
                const key = action;
                
                if (!this.rateLimits.has(key)) {
                    this.rateLimits.set(key, []);
                }
                
                const timestamps = this.rateLimits.get(key).filter(t => now - t < windowMs);
                timestamps.push(now);
                this.rateLimits.set(key, timestamps);
                
                return timestamps.length <= limit;
            },
            
            sanitizeInput(input) {
                if (typeof input !== 'string') return input;
                const div = document.createElement('div');
                div.textContent = input;
                return div.innerHTML;
            },
            
            validateSearchQuery(query) {
                const sqlPatterns = [
                    /(\b(SELECT|INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|UNION)\b)/gi,
                    /(--|#|\/\*)/g
                ];
                return !sqlPatterns.some(pattern => pattern.test(query));
            }
        };

        // ===== Initialize =====
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            loadMovies();
            setupEventListeners();
            setupInfiniteScroll();
            disableDevTools();
        }

        // ===== Event Listeners =====
        function setupEventListeners() {
            elements.searchInput.addEventListener('input', debounce(handleSearch, 500));
            
            elements.categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => handleCategoryClick(btn));
            });
            
            elements.closeModal.addEventListener('click', closeMovieModal);
            elements.modal.addEventListener('click', (e) => {
                if (e.target === elements.modal) closeMovieModal();
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMovieModal();
                if (e.key === '/' && document.activeElement !== elements.searchInput) {
                    e.preventDefault();
                    elements.searchInput.focus();
                }
            });
        }

        // ===== Infinite Scroll =====
        function setupInfiniteScroll() {
            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000) {
                    if (!state.isLoading && state.hasMorePages) {
                        state.currentPage++;
                        loadMovies(true);
                    }
                }
            });
        }

        // ===== Disable DevTools =====
        function disableDevTools() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                }
            });
        }

        // ===== Utilities =====
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num?.toString() || '0';
        }

        function formatRuntime(minutes) {
            if (!minutes) return 'غير محدد';
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return hours > 0 ? `${hours} ساعة ${mins > 0 ? `و ${mins} دقيقة` : ''}` : `${mins} دقيقة`;
        }

        function generateStars(rating) {
            if (!rating) return '☆☆☆☆☆';
            const count = Math.round(rating / 2);
            return '★'.repeat(Math.min(count, 5)) + '☆'.repeat(5 - Math.min(count, 5));
        }

        function getImageUrl(path, size = 'w500') {
            return path ? `${CONFIG.IMAGE_BASE_URL}/${size}${path}` : 'https://via.placeholder.com/500x750/1a1a2e/ffffff?text=No+Image';
        }

        function getTimeAgo(dateString) {
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            const intervals = { سنة: 31536000, شهر: 2592000, أسبوع: 604800, يوم: 86400, ساعة: 3600, دقيقة: 60 };
            for (const [unit, secs] of Object.entries(intervals)) {
                const interval = Math.floor(seconds / secs);
                if (interval >= 1) return `منذ ${interval} ${unit}`;
            }
            return 'الآن';
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function getCurrentUserId() {
            let userId = localStorage.getItem('visitorId');
            if (!userId) {
                userId = generateId();
                localStorage.setItem('visitorId', userId);
            }
            return userId;
        }

        // ===== Notifications =====
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()">×</button>`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 5000);
        }

        // ===== Loading =====
        function showLoading() {
            state.isLoading = true;
            elements.loading.style.display = 'block';
        }

        function hideLoading() {
            state.isLoading = false;
            elements.loading.style.display = 'none';
        }

        // ===== Search Handler =====
        function handleSearch(e) {
            const query = e.target.value.trim();
            if (query === state.currentSearchQuery) return;
            
            if (!security.validateSearchQuery(query)) {
                showNotification('⛔ محتوى غير مسموح', 'error');
                return;
            }
            
            state.currentSearchQuery = security.sanitizeInput(query);
            state.currentPage = 1;
            state.hasMorePages = true;
            
            if (query) {
                state.currentCategory = '';
                elements.categoryBtns.forEach(btn => btn.classList.remove('active'));
            }
            
            loadMovies();
        }

        // ===== Category Handler =====
        function handleCategoryClick(btn) {
            elements.categoryBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            state.currentCategory = btn.dataset.category;
            state.currentPage = 1;
            state.currentSearchQuery = '';
            state.hasMorePages = true;
            elements.searchInput.value = '';
            
            loadMovies();
        }

        // ===== Reset to Home =====
        function resetToHome() {
            state.currentPage = 1;
            state.currentCategory = '';
            state.currentSearchQuery = '';
            state.hasMorePages = true;
            
            elements.searchInput.value = '';
            elements.categoryBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === '');
            });
            
            loadMovies();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== Load Movies =====
        async function loadMovies(append = false) {
            if (state.isLoading) return;
            if (!security.checkRateLimit('api', 30)) {
                showNotification('⚠️ انتظر قليلاً قبل المحاولة مرة أخرى', 'warning');
                return;
            }
            
            showLoading();
            
            try {
                let url;
                if (state.currentSearchQuery) {
                    url = `${CONFIG.BASE_URL}/search/movie?api_key=${CONFIG.API_KEY}&query=${encodeURIComponent(state.currentSearchQuery)}&page=${state.currentPage}&language=${CONFIG.LANGUAGE}`;
                } else if (state.currentCategory) {
                    url = `${CONFIG.BASE_URL}/discover/movie?api_key=${CONFIG.API_KEY}&with_genres=${state.currentCategory}&page=${state.currentPage}&language=${CONFIG.LANGUAGE}&sort_by=popularity.desc`;
                } else {
                    url = `${CONFIG.BASE_URL}/movie/popular?api_key=${CONFIG.API_KEY}&page=${state.currentPage}&language=${CONFIG.LANGUAGE}`;
                }
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                
                state.hasMorePages = state.currentPage < data.total_pages;
                
                if (!append) elements.moviesGrid.innerHTML = '';
                
                if (data.results?.length > 0) {
                    data.results.forEach((movie, index) => createMovieCard(movie, index));
                } else if (!append) {
                    elements.moviesGrid.innerHTML = `
                        <div class="no-results">
                            <div class="no-results-icon">🔍</div>
                            <h3>لم يتم العثور على نتائج</h3>
                            <p>جرب البحث بكلمات مختلفة</p>
                            <button class="reset-btn" onclick="resetToHome()">العودة للرئيسية</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                if (!append) {
                    elements.moviesGrid.innerHTML = `
                        <div class="error-container">
                            <div class="error-icon">❌</div>
                            <h3>حدث خطأ في التحميل</h3>
                            <p>تحقق من اتصالك بالإنترنت</p>
                            <button class="retry-btn" onclick="loadMovies()">إعادة المحاولة</button>
                        </div>
                    `;
                }
            } finally {
                hideLoading();
            }
        }

        // ===== Create Movie Card =====
        function createMovieCard(movie, index = 0) {
            const card = document.createElement('div');
            card.className = 'movie-card fade-in';
            card.style.animationDelay = `${index * 0.05}s`;
            card.onclick = () => openMovieModal(movie.id);
            
            const rating = movie.vote_average?.toFixed(1) || 'N/A';
            const stars = generateStars(movie.vote_average);
            const year = movie.release_date ? new Date(movie.release_date).getFullYear() : 'غير محدد';
            const isFav = state.favorites.includes(movie.id);
            const isNew = movie.release_date && (new Date() - new Date(movie.release_date)) / (1000*60*60*24) <= 90;
            
            card.innerHTML = `
                <div class="movie-poster">
                    <img src="${getImageUrl(movie.poster_path)}" alt="${security.sanitizeInput(movie.title)}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/500x750/1a1a2e/ffffff?text=No+Image'" />
                    <div class="movie-overlay"></div>
                    <div class="movie-badges">
                        ${movie.vote_average >= 7 ? '<span class="badge badge-top">⭐ مميز</span>' : ''}
                        ${isNew ? '<span class="badge badge-new">جديد</span>' : ''}
                    </div>
                    <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${movie.id})">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="movie-info">
                    <h3 class="movie-title">${security.sanitizeInput(movie.title)}</h3>
                    <div class="movie-year">📅 ${year}</div>
                    <div class="movie-rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-number">${rating}</span>
                    </div>
                    <p class="movie-overview">${security.sanitizeInput(movie.overview) || 'لا يوجد وصف'}</p>
                </div>
            `;
            
            elements.moviesGrid.appendChild(card);
        }

        // ===== Toggle Favorite =====
        function toggleFavorite(movieId) {
            const index = state.favorites.indexOf(movieId);
            if (index > -1) {
                state.favorites.splice(index, 1);
                showNotification('تم إزالة الفيلم من المفضلة', 'info');
            } else {
                state.favorites.push(movieId);
                showNotification('تم إضافة الفيلم للمفضلة ❤️', 'success');
            }
            localStorage.setItem('favorites', JSON.stringify(state.favorites));
        }

        // ===== Open Movie Modal =====
        async function openMovieModal(movieId) {
            state.currentMovieId = movieId;
            showLoading();
            
            try {
                const [movie, videos, credits, similar] = await Promise.all([
                    fetch(`${CONFIG.BASE_URL}/movie/${movieId}?api_key=${CONFIG.API_KEY}&language=${CONFIG.LANGUAGE}`).then(r => r.json()),
                    fetch(`${CONFIG.BASE_URL}/movie/${movieId}/videos?api_key=${CONFIG.API_KEY}`).then(r => r.json()),
                    fetch(`${CONFIG.BASE_URL}/movie/${movieId}/credits?api_key=${CONFIG.API_KEY}`).then(r => r.json()),
                    fetch(`${CONFIG.BASE_URL}/movie/${movieId}/similar?api_key=${CONFIG.API_KEY}&language=${CONFIG.LANGUAGE}`).then(r => r.json())
                ]);
                
                displayMovieModal(movie, videos.results, credits, similar.results);
                elements.modal.style.display = 'block';
                document.body.style.overflow = 'hidden';
            } catch (error) {
                console.error('Error:', error);
                showNotification('خطأ في تحميل التفاصيل', 'error');
            } finally {
                hideLoading();
            }
        }

        // ===== Close Modal =====
        function closeMovieModal() {
            elements.modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            const iframes = elements.modalBody.querySelectorAll('iframe');
            iframes.forEach(iframe => iframe.src = '');
        }

        // ===== Display Movie Modal =====
        function displayMovieModal(movie, videos, credits, similar) {
            elements.modalBackdrop.src = getImageUrl(movie.backdrop_path || movie.poster_path, 'w1280');
            
            const rating = movie.vote_average?.toFixed(1) || 'N/A';
            const stars = generateStars(movie.vote_average);
            const year = movie.release_date ? new Date(movie.release_date).getFullYear() : 'غير محدد';
            const director = credits.crew?.find(p => p.job === 'Director')?.name || 'غير متوفر';
            const cast = credits.cast?.slice(0, 6) || [];
            const trailer = videos?.find(v => v.type === 'Trailer' && v.site === 'YouTube') || videos?.find(v => v.site === 'YouTube');
            const isFav = state.favorites.includes(movie.id);
            
            elements.modalBody.innerHTML = `
                <div class="movie-details">
                    <div class="movie-poster-section">
                        <img src="${getImageUrl(movie.poster_path)}" class="movie-poster-large" alt="${security.sanitizeInput(movie.title)}" />
                        <button class="modal-favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${movie.id}); this.classList.toggle('active'); this.innerHTML = this.classList.contains('active') ? '❤️ في المفضلة' : '🤍 أضف للمفضلة'">
                            ${isFav ? '❤️ في المفضلة' : '🤍 أضف للمفضلة'}
                        </button>
                    </div>
                    <div class="movie-meta">
                        <h1 class="movie-title-large">${security.sanitizeInput(movie.title)}</h1>
                        ${movie.tagline ? `<p class="movie-tagline">"${security.sanitizeInput(movie.tagline)}"</p>` : ''}
                        <div class="movie-stats">
                            <div class="stat"><span class="stat-label">التقييم</span><span class="stat-value">${stars} ${rating}/10</span></div>
                            <div class="stat"><span class="stat-label">السنة</span><span class="stat-value">${year}</span></div>
                            <div class="stat"><span class="stat-label">المدة</span><span class="stat-value">${formatRuntime(movie.runtime)}</span></div>
                            <div class="stat"><span class="stat-label">المخرج</span><span class="stat-value">${security.sanitizeInput(director)}</span></div>
                        </div>
                        <div class="genres">${movie.genres?.map(g => `<span class="genre-tag">${g.name}</span>`).join('') || ''}</div>
                        <div class="action-buttons">
                            <button class="watch-btn" onclick="showWatchOptions(${movie.id})">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                مشاهدة الفيلم
                            </button>
                            <button class="trailer-btn" onclick="playTrailer('${trailer?.key || ''}')">
                                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14V7l7 5-7 5z"/></svg>
                                تريلر
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="movie-overview-full">
                    <h3>📝 القصة</h3>
                    <p>${security.sanitizeInput(movie.overview) || 'لا يوجد وصف متاح'}</p>
                </div>
                
                ${cast.length > 0 ? `
                <div class="cast-section">
                    <h2>🎭 طاقم التمثيل</h2>
                    <div class="cast-grid">
                        ${cast.map(actor => `
                            <div class="cast-card">
                                <img src="${getImageUrl(actor.profile_path, 'w185')}" alt="${security.sanitizeInput(actor.name)}" onerror="this.src='https://via.placeholder.com/185x278/1a1a2e/ffffff?text=👤'" />
                                <div class="cast-info">
                                    <h4>${security.sanitizeInput(actor.name)}</h4>
                                    <p>${security.sanitizeInput(actor.character)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                <div class="player-section" id="playerSection" style="display: none;">
                    <h2>📺 مشاهدة الفيلم</h2>
                    <div class="server-buttons" id="serverButtons"></div>
                    <div class="player-container" id="playerContainer"></div>
                </div>
                
                ${similar?.length > 0 ? `
                <div class="similar-section">
                    <h2>🎬 أفلام مشابهة</h2>
                    <div class="similar-grid">
                        ${similar.slice(0, 6).map(m => `
                            <div class="similar-card" onclick="openMovieModal(${m.id})">
                                <img src="${getImageUrl(m.poster_path, 'w185')}" alt="${security.sanitizeInput(m.title)}" />
                                <div class="similar-info">
                                    <h4>${security.sanitizeInput(m.title)}</h4>
                                    <span>${m.vote_average?.toFixed(1) || 'N/A'} ⭐</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                ${generateCommentsSection(movie.id)}
            `;
        }

        // ===== Show Watch Options =====
        function showWatchOptions(movieId) {
            const section = document.getElementById('playerSection');
            const buttons = document.getElementById('serverButtons');
            
            section.style.display = 'block';
            buttons.innerHTML = VIDEO_SERVERS.map((server, i) => 
                `<button class="server-btn ${i === 0 ? 'active' : ''}" onclick="changeServer(${i}, ${movieId})">${server.name}</button>`
            ).join('');
            
            changeServer(0, movieId);
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // ===== Change Server =====
        function changeServer(index, movieId) {
            state.currentServer = index;
            const server = VIDEO_SERVERS[index];
            
            document.querySelectorAll('.server-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
            document.getElementById('playerContainer').innerHTML = `<iframe class="video-player" src="${server.url(movieId)}" allowfullscreen></iframe>`;
        }

        // ===== Play Trailer =====
        function playTrailer(key) {
            if (!key) {
                showNotification('لا يوجد تريلر متاح', 'info');
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'trailer-modal';
            modal.innerHTML = `
                <div class="trailer-modal-content">
                    <button class="trailer-close-btn" onclick="this.parentElement.parentElement.remove()">×</button>
                    <iframe src="https://www.youtube.com/embed/${key}?autoplay=1" allowfullscreen></iframe>
                </div>
            `;
            document.body.appendChild(modal);
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        // ===== Comments System =====
        function generateCommentsSection(movieId) {
            const comments = commentsState.comments[movieId] || [];
            
            return `
                <div class="comments-section">
                    <h2>💬 التعليقات <span class="comments-count">${comments.length}</span></h2>
                    
                    <div class="comment-form">
                        <h3>✍️ أضف تعليقك</h3>
                        <form onsubmit="submitComment(event, ${movieId})">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>الاسم *</label>
                                    <input type="text" id="commenterName" required minlength="2" maxlength="50" placeholder="أدخل اسمك" />
                                </div>
                                <div class="form-group">
                                    <label>البريد (اختياري)</label>
                                    <input type="email" id="commenterEmail" placeholder="example@email.com" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>تقييمك</label>
                                <div class="rating-input">
                                    ${[5,4,3,2,1].map(i => `<input type="radio" name="rating" id="star${i}" value="${i}" ${i===5?'checked':''}><label for="star${i}">★</label>`).join('')}
                                </div>
                            </div>
                            <div class="form-group">
                                <label>تعليقك *</label>
                                <textarea id="commentText" required minlength="10" maxlength="500" placeholder="شاركنا رأيك..."></textarea>
                            </div>
                            <button type="submit" class="submit-comment-btn">
                                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                                إرسال
                            </button>
                        </form>
                    </div>
                    
                    ${comments.length > 0 ? `
                        <div class="comments-sort">
                            <span>ترتيب:</span>
                            <div class="sort-buttons">
                                <button class="sort-btn active" onclick="sortComments(${movieId}, 'newest')">الأحدث</button>
                                <button class="sort-btn" onclick="sortComments(${movieId}, 'oldest')">الأقدم</button>
                                <button class="sort-btn" onclick="sortComments(${movieId}, 'rating')">التقييم</button>
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="comments-list" id="commentsList">
                        ${generateCommentsList(movieId)}
                    </div>
                </div>
            `;
        }

        function generateCommentsList(movieId) {
            let comments = commentsState.comments[movieId] || [];
            if (comments.length === 0) {
                return `<div class="no-comments"><div class="no-comments-icon">💭</div><p>كن أول من يعلق!</p></div>`;
            }
            
            // Sort
            comments = [...comments].sort((a, b) => {
                if (commentsState.sortBy === 'oldest') return new Date(a.date) - new Date(b.date);
                if (commentsState.sortBy === 'rating') return b.rating - a.rating;
                return new Date(b.date) - new Date(a.date);
            });
            
            return comments.slice(0, commentsState.currentPage * commentsState.commentsPerPage).map(c => `
                <div class="comment-card">
                    <div class="comment-header">
                        <div class="comment-user">
                            <div class="user-avatar">${c.name.substring(0, 2)}</div>
                            <div class="user-info">
                                <h4>${security.sanitizeInput(c.name)}</h4>
                                <span>${getTimeAgo(c.date)}</span>
                            </div>
                        </div>
                        <div class="comment-rating">
                            <span class="stars">${'★'.repeat(c.rating)}${'☆'.repeat(5-c.rating)}</span>
                            <span>${c.rating}/5</span>
                        </div>
                    </div>
                    <div class="comment-body">${security.sanitizeInput(c.text)}</div>
                    <div class="comment-footer">
                        <div class="comment-actions">
                            <button class="comment-action-btn" onclick="likeComment(${movieId}, '${c.id}')">👍 ${c.likes || 0}</button>
                            <button class="comment-action-btn" onclick="toggleReplyForm('${c.id}')">💬 رد</button>
                        </div>
                    </div>
                    <div class="reply-form" id="replyForm-${c.id}">
                        <textarea placeholder="اكتب ردك..." id="replyText-${c.id}"></textarea>
                        <div class="reply-actions">
                            <button class="reply-btn reply-cancel" onclick="toggleReplyForm('${c.id}')">إلغاء</button>
                            <button class="reply-btn reply-submit" onclick="submitReply(${movieId}, '${c.id}')">إرسال</button>
                        </div>
                    </div>
                    ${c.replies?.length > 0 ? `
                        <div class="comment-replies">
                            ${c.replies.map(r => `
                                <div class="reply-card">
                                    <div class="comment-header">
                                        <div class="comment-user">
                                            <div class="user-avatar">${r.name.substring(0,2)}</div>
                                            <div class="user-info"><h4>${security.sanitizeInput(r.name)}</h4><span>${getTimeAgo(r.date)}</span></div>
                                        </div>
                                    </div>
                                    <div class="comment-body">${security.sanitizeInput(r.text)}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function submitComment(event, movieId) {
            event.preventDefault();
            
            if (!security.checkRateLimit('comment', 5, 3600000)) {
                showNotification('⚠️ انتظر قبل إضافة تعليق آخر', 'warning');
                return;
            }
            
            const name = document.getElementById('commenterName').value.trim();
            const text = document.getElementById('commentText').value.trim();
            const rating = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 5);
            
            if (!name || !text || text.length < 10) {
                showNotification('أكمل جميع الحقول المطلوبة', 'error');
                return;
            }
            
            if (!commentsState.comments[movieId]) commentsState.comments[movieId] = [];
            
            commentsState.comments[movieId].unshift({
                id: generateId(),
                name: security.sanitizeInput(name),
                text: security.sanitizeInput(text),
                rating,
                date: new Date().toISOString(),
                likes: 0,
                replies: []
            });
            
            localStorage.setItem('movieComments', JSON.stringify(commentsState.comments));
            
            document.getElementById('commenterName').value = '';
            document.getElementById('commentText').value = '';
            
            refreshComments(movieId);
            showNotification('تم إضافة تعليقك! 🎉', 'success');
        }

        function likeComment(movieId, commentId) {
            const comment = commentsState.comments[movieId]?.find(c => c.id === commentId);
            if (comment) {
                comment.likes = (comment.likes || 0) + 1;
                localStorage.setItem('movieComments', JSON.stringify(commentsState.comments));
                refreshComments(movieId);
            }
        }

        function toggleReplyForm(commentId) {
            document.getElementById(`replyForm-${commentId}`)?.classList.toggle('active');
        }

        function submitReply(movieId, commentId) {
            const text = document.getElementById(`replyText-${commentId}`)?.value.trim();
            if (!text) return;
            
            let name = localStorage.getItem('userName');
            if (!name) {
                name = prompt('اسمك:');
                if (!name) return;
                localStorage.setItem('userName', name);
            }
            
            const comment = commentsState.comments[movieId]?.find(c => c.id === commentId);
            if (comment) {
                if (!comment.replies) comment.replies = [];
                comment.replies.push({
                    id: generateId(),
                    name: security.sanitizeInput(name),
                    text: security.sanitizeInput(text),
                    date: new Date().toISOString()
                });
                localStorage.setItem('movieComments', JSON.stringify(commentsState.comments));
                refreshComments(movieId);
                showNotification('تم إضافة ردك!', 'success');
            }
        }

        function sortComments(movieId, sortBy) {
            commentsState.sortBy = sortBy;
            refreshComments(movieId);
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function refreshComments(movieId) {
            const list = document.getElementById('commentsList');
            const count = document.querySelector('.comments-count');
            if (list) list.innerHTML = generateCommentsList(movieId);
            if (count) count.textContent = (commentsState.comments[movieId] || []).length;
        }

        // ===== Console Protection =====
        console.log('%c🔒 MovieHub Protected', 'color: #00ff00; font-size: 20px; font-weight: bold;');
    </script>
</body>
</html>
