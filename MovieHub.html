    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary-color: #6b2d5c;
            --secondary-color: #c17a8b;
            --accent-color: #e50914;
            --bg-dark: #0a0a0a;
            --bg-medium: #1a1a2e;
            --bg-light: #16213e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(107, 45, 92, 0.3);
            --success-color: #00b894;
            --warning-color: #f39c12;
            --error-color: #e74c3c;
            --gold-color: #ffd700;
            --shadow-color: rgba(107, 45, 92, 0.4);
            --transition-speed: 0.3s;
            --border-radius: 20px;
            --border-radius-sm: 10px;
            --border-radius-lg: 30px;
        }

        /* ===== Reset & Base Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *::selection {
            background: var(--primary-color);
            color: var(--text-primary);
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 50%, var(--bg-light) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Scrollbar Styling ===== */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-medium);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #8b3d7c, #d18a9b);
        }

        /* ===== Header & Navigation ===== */
        .header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            text-decoration: none;
        }

        .logo:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .logo svg {
            width: 36px;
            height: 36px;
            fill: url(#logoGradient);
        }

        /* ===== Search Container ===== */
        .search-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 0.7rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.15);
            transition: all var(--transition-speed) ease;
        }

        .search-bar:focus-within {
            border-color: var(--secondary-color);
            box-shadow: 0 0 25px rgba(193, 122, 139, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 0.5rem;
            width: 300px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-bar .search-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            padding: 5px;
        }

        .search-bar .search-icon:hover {
            color: var(--secondary-color);
            transform: scale(1.1);
        }

        .search-bar svg {
            width: 20px;
            height: 20px;
        }

        /* ===== Main Content ===== */
        .main-content {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== Hero Section ===== */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #2c2a4a 0%, var(--primary-color) 50%, var(--secondary-color) 100%);
            border-radius: 25px;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 50px var(--shadow-color);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: heroGlow 10s ease-in-out infinite;
        }

        @keyframes heroGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25%, 25%); }
        }

        .hero h1 {
            color: var(--text-primary);
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-primary);
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* ===== Categories ===== */
        .categories {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1rem 0;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(10px);
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            font-family: 'Cairo', sans-serif;
        }

        .category-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px var(--shadow-color);
            border-color: transparent;
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            box-shadow: 0 10px 30px var(--shadow-color);
            transform: scale(1.05);
        }

        /* ===== Loading Spinner ===== */
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }

        .spinner {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: var(--secondary-color);
            border-right-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Movies Grid ===== */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        /* ===== Movie Card ===== */
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 2px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 60px var(--shadow-color);
            border-color: rgba(193, 122, 139, 0.6);
        }

        .movie-poster {
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .movie-poster img {
            transform: scale(1.15);
        }

        .movie-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .movie-card:hover .movie-overlay {
            opacity: 1;
        }

        .movie-badges {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 5;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .badge-top {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: white;
        }

        .badge-new {
            background: linear-gradient(135deg, var(--success-color), #00cec9);
            color: white;
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed) ease;
            z-index: 5;
            backdrop-filter: blur(10px);
        }

        .favorite-btn:hover {
            transform: scale(1.2);
            background: rgba(231, 76, 60, 0.8);
        }

        .favorite-btn.active {
            animation: heartBeat 0.5s ease;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 5;
        }

        .play-overlay svg {
            width: 80px;
            height: 80px;
            fill: var(--secondary-color);
            filter: drop-shadow(0 0 20px rgba(193, 122, 139, 0.8));
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ===== Movie Info ===== */
        .movie-info {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-year {
            color: var(--secondary-color);
            font-size: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .stars {
            color: var(--gold-color);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .rating-number {
            background: linear-gradient(135deg, rgba(107, 45, 92, 0.3), rgba(193, 122, 139, 0.3));
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid rgba(193, 122, 139, 0.3);
        }

        .movie-overview {
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.75;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== Modal Styles ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            margin: 2rem auto;
            background: linear-gradient(145deg, rgba(20, 20, 40, 0.98), rgba(40, 40, 60, 0.98));
            border-radius: 25px;
            max-width: 1000px;
            width: 95%;
            border: 2px solid var(--border-color);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .modal-header {
            position: relative;
            height: 450px;
            overflow: hidden;
        }

        .modal-backdrop {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(20, 20, 40, 1) 0%, rgba(20, 20, 40, 0.8) 30%, transparent 100%);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed) ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .close-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            transform: scale(1.1) rotate(90deg);
        }

        .modal-body {
            padding: 2.5rem;
        }

        /* ===== Movie Details in Modal ===== */
        .movie-details {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 2.5rem;
            margin-bottom: 2rem;
        }

        .movie-poster-section {
            position: relative;
        }

        .movie-poster-large {
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            border: 3px solid var(--border-color);
        }

        .modal-favorite-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(193, 122, 139, 0.5);
            color: white;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: all var(--transition-speed) ease;
        }

        .modal-favorite-btn:hover,
        .modal-favorite-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
        }

        .movie-meta {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .movie-title-large {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .original-title {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }

        .movie-tagline {
            font-style: italic;
            opacity: 0.7;
            font-size: 1.15rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .movie-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary-color);
        }

        /* ===== Genres ===== */
        .genres {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .genre-tag {
            background: linear-gradient(135deg, rgba(107, 45, 92, 0.3), rgba(193, 122, 139, 0.3));
            border: 1px solid rgba(193, 122, 139, 0.4);
            padding: 0.4rem 1rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-speed) ease;
        }

        .genre-tag:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transform: scale(1.05);
        }

        /* ===== Action Buttons ===== */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .watch-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-color) 0%, #b20710 100%);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .watch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .watch-btn:hover::before {
            left: 100%;
        }

        .watch-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 50px rgba(229, 9, 20, 0.7);
        }

        .watch-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .watch-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .trailer-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(193, 122, 139, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all var(--transition-speed) ease;
        }

        .trailer-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            transform: translateY(-3px);
        }

        .trailer-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ===== Movie Overview ===== */
        .movie-overview-full {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border-right: 4px solid var(--primary-color);
        }

        .movie-overview-full h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .movie-overview-full p {
            line-height: 1.8;
            font-size: 1.05rem;
            color: var(--text-secondary);
        }

        /* ===== Movie Features ===== */
        .movie-features {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin: 2rem 0;
        }

        .movie-features h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: var(--border-radius-sm);
            transition: all var(--transition-speed) ease;
        }

        .feature-item:hover {
            background: rgba(107, 45, 92, 0.2);
            transform: translateX(-5px);
        }

        .feature-label {
            display: block;
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 0.3rem;
        }

        .feature-value {
            color: var(--secondary-color);
            font-weight: 600;
        }

        /* ===== Cast Section ===== */
        .cast-section {
            margin-top: 2rem;
        }

        .cast-section h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        .cast-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            overflow: hidden;
            transition: all var(--transition-speed) ease;
        }

        .cast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .cast-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .cast-info {
            padding: 1rem;
            text-align: center;
        }

        .cast-info h4 {
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .cast-info p {
            font-size: 0.8rem;
            opacity: 0.7;
            color: var(--secondary-color);
        }

        /* ===== Similar Movies ===== */
        .similar-section {
            margin-top: 2rem;
        }

        .similar-section h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }

        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1rem;
        }

        .similar-card {
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .similar-card:hover {
            transform: scale(1.05);
        }

        .similar-card img {
            width: 100%;
            border-radius: var(--border-radius-sm);
            margin-bottom: 0.5rem;
        }

        .similar-info h4 {
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .similar-info span {
            font-size: 0.8rem;
            color: var(--gold-color);
        }

        /* ===== Player Section ===== */
        .player-section {
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: var(--border-radius);
        }

        .player-section h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }

        .server-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .server-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-color);
            color: #fff;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all var(--transition-speed) ease;
        }

        .server-btn:hover,
        .server-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .player-container {
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        .video-player {
            width: 100%;
            height: 500px;
            border: none;
        }

        /* ===== Trailer Section ===== */
        .trailer-section {
            margin-top: 2.5rem;
        }

        .trailer-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000;
            border: 2px solid var(--border-color);
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-trailer {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--border-radius);
            font-size: 1.2rem;
            opacity: 0.6;
            border: 2px dashed var(--border-color);
        }

        /* ===== Trailer Modal ===== */
        .trailer-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .trailer-modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16/9;
        }

        .trailer-modal-content iframe {
            width: 100%;
            height: 100%;
            border-radius: 15px;
        }

        .trailer-close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 2rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .trailer-close-btn:hover {
            background: var(--error-color);
            transform: rotate(90deg);
        }

        /* ===== Comments Section ===== */
        .comments-section {
            margin-top: 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--border-radius);
            padding: 2rem;
            border: 1px solid var(--border-color);
        }

        .comments-section h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
        }

        .comments-count {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Comment Form */
        .comment-form {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .comment-form h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: #fff;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all var(--transition-speed) ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(193, 122, 139, 0.2);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Rating Input */
        .rating-input {
            display: flex;
            gap: 5px;
            direction: ltr;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }

        .rating-input input {
            display: none;
        }

        .rating-input label {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rating-input input:checked ~ label,
        .rating-input label:hover,
        .rating-input label:hover ~ label {
            color: var(--gold-color);
            transform: scale(1.1);
        }

        /* Submit Comment Button */
        .submit-comment-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all var(--transition-speed) ease;
            margin-top: 0.5rem;
        }

        .submit-comment-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .submit-comment-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .submit-comment-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Comments Sort */
        .comments-sort {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .sort-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            transition: all var(--transition-speed) ease;
        }

        .sort-btn:hover,
        .sort-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            color: white;
        }

        /* Comments List */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .comment-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(107, 45, 92, 0.2);
            transition: all var(--transition-speed) ease;
            animation: fadeInUp 0.5s ease;
        }

        .comment-card:hover {
            border-color: rgba(193, 122, 139, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .comment-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
        }

        .user-info h4 {
            font-size: 1rem;
            margin-bottom: 3px;
            color: #fff;
        }

        .user-info span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .comment-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 215, 0, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .comment-rating .stars {
            color: var(--gold-color);
            font-size: 0.9rem;
        }

        .comment-rating span:last-child {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .comment-body {
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 1rem;
        }

        .comment-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comment-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .comment-action-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            transition: all var(--transition-speed) ease;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .comment-action-btn:hover {
            color: var(--secondary-color);
            background: rgba(193, 122, 139, 0.1);
        }

        .comment-action-btn.liked {
            color: var(--error-color);
        }

        .comment-action-btn.disliked {
            color: #3498db;
        }

        /* Reply Section */
        .reply-form {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--border-radius-sm);
            display: none;
        }

        .reply-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .reply-form textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-family: 'Cairo', sans-serif;
            resize: none;
            min-height: 60px;
            margin-bottom: 0.5rem;
        }

        .reply-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .reply-btn {
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            transition: all var(--transition-speed) ease;
        }

        .reply-submit {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
        }

        .reply-cancel {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        /* Replies */
        .comment-replies {
            margin-top: 1rem;
            padding-right: 2rem;
            border-right: 2px solid var(--border-color);
        }

        .reply-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.8rem;
        }

        .reply-card .user-avatar {
            width: 35px;
            height: 35px;
            font-size: 0.9rem;
        }

        /* Load More */
        .load-more-comments {
            text-align: center;
            margin-top: 2rem;
        }

        .load-more-btn {
            padding: 12px 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-color);
            color: white;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: all var(--transition-speed) ease;
        }

        .load-more-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            transform: translateY(-3px);
        }

        /* No Comments */
        .no-comments {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .no-comments-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .no-comments p {
            font-size: 1.1rem;
        }

        /* ===== No Results ===== */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--border-radius);
            border: 2px dashed var(--border-color);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
        }

        .no-results p {
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .reset-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: all var(--transition-speed) ease;
        }

        .reset-btn:hover {
            transform: scale(1.05);
        }

        /* ===== Error Container ===== */
        .error-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(231, 76, 60, 0.1);
            border-radius: var(--border-radius);
            border: 2px solid rgba(231, 76, 60, 0.3);
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .error-container h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--error-color);
        }

        .error-container p {
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--error-color), #c0392b);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: all var(--transition-speed) ease;
        }

        .retry-btn:hover {
            transform: scale(1.05);
        }

        /* ===== Skeleton Loading ===== */
        .skeleton-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .skeleton-poster {
            height: 400px;
        }

        .skeleton-info {
            padding: 1.5rem;
        }

        .skeleton-title {
            height: 24px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .skeleton-year {
            height: 18px;
            width: 60%;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .skeleton-rating {
            height: 18px;
            width: 40%;
            border-radius: 5px;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ===== Notifications ===== */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius-sm);
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        .notification-success {
            background: linear-gradient(135deg, var(--success-color), #00cec9);
        }

        .notification-error {
            background: linear-gradient(135deg, var(--error-color), #c0392b);
        }

        .notification-warning {
            background: linear-gradient(135deg, var(--warning-color), #e67e22);
        }

        .notification-info {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        .notification button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== Security Blocked Page ===== */
        .blocked-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-medium);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            text-align: center;
            font-family: 'Cairo', sans-serif;
        }

        .blocked-page h1 {
            color: var(--error-color);
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .blocked-page p {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .blocked-page small {
            opacity: 0.7;
        }

        /* ===== Footer ===== */
        .footer {
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem;
            text-align: center;
            margin-top: 4rem;
            border-top: 2px solid var(--border-color);

        .footer p {

        }

        .footer a {
            color: var(--secondary-color);
